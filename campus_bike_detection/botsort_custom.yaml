tracker_type: botsort
track_high_thresh: 0.25
track_low_thresh: 0.1
new_track_thresh: 0.4       # 提高：减少误创建新轨迹
track_buffer: 90            # 提高：遮挡后保留 90 帧再放弃（默认 30）
match_thresh: 0.9           # 放宽：更容易重匹配回原轨迹
fuse_score: True
gmc_method: sparseOptFlow
proximity_thresh: 0.5
appearance_thresh: 0.8
with_reid: False
model: auto
